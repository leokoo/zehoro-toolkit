name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        wp:  ['latest']

    name: PHPUnit (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl, dom, json
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; do
            echo "waiting for mysql..."; sleep 2;
          done

      - name: Install WP test environment
        env:
          WP_DB_HOST: 127.0.0.1
          WP_DB_USER: root
          WP_DB_PASSWORD: root
        run: |
          chmod +x bin/install-wp-tests.sh
          bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }} true

      - name: Run PHPUnit
        env:
          WP_DB_HOST: 127.0.0.1
          WP_DB_USER: root
          WP_DB_PASSWORD: root
        run: vendor/bin/phpunit --colors=always

  lint:
    runs-on: ubuntu-latest
    name: PHP syntax lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Lint all PHP files
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
